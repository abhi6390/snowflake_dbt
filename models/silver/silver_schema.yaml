models:
  - name: silver_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: country
        tests:
          - accepted_values:
              values: ['INDIA','USA','UK','OTHER']
      - name: status
        tests:
          - accepted_values:
              values: ['ACTIVE','CLOSED','INACTIVE']

  - name: silver_accounts
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['ACTIVE','CLOSED','INACTIVE']

  - name: silver_transactions
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: silver_daily_balances
    columns:
      - name: account_id
        tests:
          - not_null
      - name: balance_date
        tests:
          - not_null